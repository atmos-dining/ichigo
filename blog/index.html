<body data-page="blog">

  <div id="shared-header"></div>

        </p>

    <section class="section is-inview">
      <div class="section-inner">

        <p id="blogStatus" style="margin-top:14px; opacity:.75;"></p>

  <script src="../common.js"></script>

  <script>
  (function() {
    var listEl = document.getElementById('blogList');
    var statusEl = document.getElementById('blogStatus');

    function esc(s){
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function fmtDate(d){
      var m = String(d||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return m ? m[1]+'.'+m[2]+'.'+m[3] : esc(d||'');
    }

    (async function() {
      try {
        if(statusEl) statusEl.textContent = '読み込み中...';
        var res = await fetch('./posts.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('posts.jsonが読み込めません（' + res.status + '）');
        var data = await res.json();
        var posts = (data.posts != null ? data.posts : data);
        if (!Array.isArray(posts)) throw new Error('posts.jsonの形式が不正です');

        posts.sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); });

        if (posts.length === 0) {
          if(statusEl) statusEl.textContent = 'まだ記事がありません。';
          return;
        }

        listEl.innerHTML = posts.map(function(p) {
          var href = './posts/post.html?slug=' + encodeURIComponent(p.slug);
          var bg = p.image ? 'style="background-image:url(\'' + esc(p.image) + '\');"' : '';
          return '<article class="blog-card">'
            + '<a href="' + href + '">'
            + '<div class="blog-image" ' + bg + '></div>'
            + '<div class="blog-body">'
            + '<time class="blog-date" datetime="' + esc(p.date) + '">' + fmtDate(p.date) + '</time>'
            + '<h3 class="blog-title">' + esc(p.title) + '</h3>'
            + '<p class="blog-excerpt">' + esc(p.excerpt) + '</p>'
            + '</div></a></article>';
        }).join('');

        if(statusEl) statusEl.textContent = '';
      } catch(e) {
        if(statusEl) statusEl.textContent = 'エラー：' + (e && e.message ? e.message : e);
        console.error(e);
      }
    })();
  })();
  </script>
